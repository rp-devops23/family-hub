<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Generating icons... check Downloads folder.</p>
<canvas id="c"></canvas>
<script>
const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#00A3E0"/>
  <path d="M256 110 L390 230 L390 400 L122 400 L122 230 Z" fill="white" opacity="0.15"/>
  <path d="M100 248 L256 108 L412 248" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="148" y="248" width="216" height="152" rx="8" fill="white" opacity="0.95"/>
  <rect x="224" y="316" width="64" height="84" rx="8" fill="#00A3E0"/>
  <rect x="164" y="272" width="52" height="44" rx="6" fill="#00A3E0" opacity="0.85"/>
  <text x="190" y="301" text-anchor="middle" font-size="26" font-family="system-ui">💰</text>
  <rect x="296" y="272" width="52" height="44" rx="6" fill="#00A3E0" opacity="0.85"/>
  <text x="322" y="301" text-anchor="middle" font-size="26" font-family="system-ui">🍽️</text>
</svg>`

const blob = new Blob([svg], {type: 'image/svg+xml'})
const url = URL.createObjectURL(blob)
const img = new Image()
img.onload = () => {
  [192, 512].forEach(size => {
    const c = document.getElementById('c')
    c.width = size; c.height = size
    const ctx = c.getContext('2d')
    ctx.clearRect(0, 0, size, size)
    ctx.drawImage(img, 0, 0, size, size)
    const a = document.createElement('a')
    a.download = `icon-${size}.png`
    a.href = c.toDataURL('image/png')
    a.click()
  })
  document.querySelector('p').textContent = '✅ Done! Copy icon-192.png and icon-512.png to public/icons/'
}
img.src = url
</script>
</body>
</html>
