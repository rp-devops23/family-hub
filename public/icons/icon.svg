<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#00A3E0"/>

  <!-- Roof -->
  <path d="M96 252 L256 104 L416 252" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- House body -->
  <rect x="144" y="252" width="224" height="160" rx="10" fill="white"/>

  <!-- Door -->
  <rect x="220" y="320" width="72" height="92" rx="8" fill="#00A3E0"/>

  <!-- Left window — € sign -->
  <rect x="158" y="270" width="60" height="52" rx="6" fill="#E8F6FD"/>
  <text x="188" y="306" text-anchor="middle" font-size="34" font-weight="700" font-family="Arial, sans-serif" fill="#00A3E0">€</text>

  <!-- Right window — fork shape -->
  <rect x="294" y="270" width="60" height="52" rx="6" fill="#E8F6FD"/>
  <!-- Fork handle -->
  <rect x="318" y="280" width="6" height="34" rx="3" fill="#00A3E0"/>
  <!-- Fork tines -->
  <rect x="310" y="280" width="4" height="18" rx="2" fill="#00A3E0"/>
  <rect x="326" y="280" width="4" height="18" rx="2" fill="#00A3E0"/>
  <!-- Fork tine base -->
  <path d="M310 296 Q312 304 318 306 Q324 304 326 296" stroke="#00A3E0" stroke-width="2.5" fill="none"/>
</svg>
